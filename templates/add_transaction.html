{% extends "base.html" %}

{% block content %}
<div class="form-container glass">
    <h3 style="margin-bottom: 25px;">Record Secure Transaction</h3>
    
    <form method="POST">
        <div class="form-group">
            <label>Select Account</label>
            <select name="account_id" required>
                {% for acc in accounts %}
                <option value="{{ acc.id }}">{{ acc.name }} (₹{{ "{:,.2f}".format(acc.balance) }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Transaction Type</label>
            <select name="type" required>
                <option value="debit">Payment / Expense (Debit)</option>
                <option value="credit">Salary / Income (Credit)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Internal Transfer? (Between My Accounts)</label>
            <select name="transfer_to_account_id">
                <option value="">No (External Transaction)</option>
                {% for acc in accounts %}
                <option value="{{ acc.id }}">Transfer to: {{ acc.name }}</option>
                {% endfor %}
            </select>
            <p style="font-size: 0.7rem; color: var(--text-gray); margin-top: 5px;">
                Note: Internal transfers aren't counted as new wealth and will be struck-through in records.
            </p>
        </div>

        <div class="form-group">
            <label>Transaction Date</label>
            <input type="date" name="date" required value="{{ today }}">
        </div>

        <div class="form-group">
            <label>Link to Loan/EMI (Optional for tracking)</label>
            <select name="emi_id">
                <option value="">None (General Expense)</option>
                {% for acc in accounts %}
                    {% for emi in acc.emis %}
                    <option value="{{ emi.id }}">{{ emi.decrypt_all(session.get('decryption_key')).name }} ({{ acc.name }})</option>
                    {% endfor %}
                {% endfor %}
            </select>
            <p style="font-size: 0.7rem; color: var(--text-gray); margin-top: 5px;">
                Linking a transaction will update the "Paid vs Pending" graph for that loan.
            </p>
        </div>

        <div class="form-group">
            <label>Description (e.g. Rent, HDFC Credit Card, Coffee)</label>
            <input type="text" name="description" required placeholder="Description">
        </div>

        <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" step="0.01" name="amount" required placeholder="Amount">
        </div>

        <div class="form-group">
            <label>Category (Optional)</label>
            <input type="text" name="category" placeholder="e.g. Food, Salary, Investment">
        </div>
        
        <button type="submit">Encrypt & Record Transaction</button>
    </form>
</div>
{% endblock %}
