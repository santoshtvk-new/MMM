{% extends "base.html" %}

{% block content %}
<div class="form-container glass">
    <div class="logo" style="text-align: center; margin-bottom: 20px;">MMM Secure Lock</div>
    <p style="text-align: center; color: var(--text-gray); margin-bottom: 30px;">
        All your data is encrypted with your Special Key. Only you can unlock it.
    </p>

    <form method="POST">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Special Key (Keep it safe!)</label>
            <input type="password" name="special_key" required placeholder="Long/Complex Key">
        </div>
        <button type="submit">Unlock Vault</button>
    </form>

    <div style="margin-top: 20px; text-align: center;">
        <a href="{{ url_for('forgot_key') }}" style="color: var(--text-gray); font-size: 0.8rem; text-decoration: none;">Forgot Key? Recovery Instructions</a>
    </div>
</div>
{% endblock %}
